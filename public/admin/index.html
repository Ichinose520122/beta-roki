<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>图库管理 · 一ノ瀬林檎的小洛克冒险之旅</title>
    <link rel="stylesheet" href="./admin.css" />
    <script src="./admin.js?v=20260712-category-manager" defer></script>
  </head>
  <body>
    <header class="admin-header">
      <div>
        <p>GALLERY ADMIN</p>
        <h1>图库管理</h1>
      </div>
      <a href="/" target="_blank" rel="noopener noreferrer">查看公开图库 ↗</a>
    </header>

    <main>
      <section class="summary-bar" aria-live="polite">
        <p id="summary">正在读取图库…</p>
        <span id="admin-email"></span>
      </section>

      <section class="actions" aria-label="图库操作">
        <button class="primary" id="open-upload" type="button">上传截图</button>
        <label class="file-action">
          <span>选择旧 gallery.json</span>
          <input id="import-input" type="file" accept="application/json,.json" />
        </label>
        <button id="import-button" type="button" disabled>导入旧索引</button>
        <button id="open-categories" type="button">管理分组</button>
        <button id="open-move" type="button">整组迁移</button>
        <a class="export-action" href="/api/admin/export">导出私有 gallery</a>
      </section>

      <section class="filters" aria-label="筛选图库">
        <input id="filter-query" type="search" placeholder="搜索标题、评论、标签或时间" />
        <select id="filter-category" aria-label="筛选分类">
          <option value="">全部分类</option>
        </select>
        <select id="filter-state" aria-label="筛选状态">
          <option value="">全部状态</option>
          <option value="pinned">置顶</option>
          <option value="featured">精选</option>
        </select>
      </section>

      <section class="bulk-bar" aria-label="批量编辑">
        <label class="select-visible">
          <input id="select-visible" type="checkbox" />
          <span>选择当前结果</span>
        </label>
        <strong id="selected-count" aria-live="polite">已选 0 张</strong>
        <select id="bulk-category" aria-label="批量移动到分组">
          <option value="">选择目标分组</option>
        </select>
        <button id="bulk-move" type="button" disabled>移动分组</button>
        <span class="bulk-divider" aria-hidden="true"></span>
        <label class="bulk-until">
          <span>置顶/精选至（留空永久）</span>
          <input id="bulk-until" type="datetime-local" step="1" aria-label="批量置顶或精选的结束时间，留空表示永久" />
        </label>
        <button type="button" data-bulk-action="feature-on" disabled>设为精选</button>
        <button type="button" data-bulk-action="feature-off" disabled>取消精选</button>
        <button type="button" data-bulk-action="pin-on" disabled>置顶</button>
        <button type="button" data-bulk-action="pin-off" disabled>取消置顶</button>
        <button class="quiet" id="clear-selection" type="button" disabled>清空选择</button>
      </section>

      <section class="image-list" id="image-list" aria-busy="true"></section>

      <div class="empty" id="empty" hidden>
        <h2>没有找到图片</h2>
        <p>可以上传新截图，或导入现有 gallery.json。</p>
      </div>
    </main>

    <dialog id="category-dialog">
      <section class="category-manager">
        <header>
          <div>
            <h2>管理分组</h2>
            <p>调整后的顺序会同步到公开图库。</p>
          </div>
          <button class="close-button" type="button" data-close="category-dialog" aria-label="关闭">×</button>
        </header>

        <form id="category-create-form" class="category-create-form">
          <input name="name" maxlength="60" placeholder="新分组名称" required />
          <button class="primary" type="submit">新增分组</button>
        </form>

        <div class="category-manager-list" id="category-manager-list"></div>
        <p class="category-manager-note">有图片的分组需要先使用“整组迁移”，清空后才能删除。</p>
      </section>
    </dialog>

    <dialog id="move-dialog">
      <form class="editor" id="move-form">
        <header>
          <h2>整组迁移</h2>
          <button class="close-button" type="button" data-close="move-dialog" aria-label="关闭">×</button>
        </header>

        <label>来源组<select name="fromCategory" required></select></label>
        <label>目标组<select name="toCategory" required></select></label>
        <p class="wide move-note">
          来源组中的全部图片都会改到目标组，评论、标签、置顶、加精和截图时间保持不变。
        </p>

        <footer>
          <button type="button" data-close="move-dialog">取消</button>
          <button class="primary" type="submit">确认迁移</button>
        </footer>
      </form>
    </dialog>

    <dialog id="upload-dialog">
      <form class="editor" id="upload-form">
        <header>
          <h2>上传截图</h2>
          <button class="close-button" type="button" data-close="upload-dialog" aria-label="关闭">×</button>
        </header>

        <label class="wide">图片<input name="file" type="file" accept="image/webp,image/jpeg,image/png,image/avif,image/gif" multiple required /></label>
        <label>分类<select name="category" required></select></label>
        <label>截图时间<input name="time" type="datetime-local" step="1" required /></label>
        <label class="wide">标题<input name="title" maxlength="160" placeholder="可选" /></label>
        <label class="wide">照片评论<textarea name="comment" maxlength="2000" rows="4" placeholder="写下这个瞬间的故事…"></textarea></label>
        <label class="wide">标签<input name="tags" placeholder="多个标签用逗号分隔" /></label>

        <fieldset>
          <legend>置顶</legend>
          <label class="check"><input name="pinnedEnabled" type="checkbox" /> 启用置顶</label>
          <label>结束时间<input name="pinnedUntil" type="datetime-local" step="1" disabled /></label>
          <small>不填写结束时间即永久置顶。</small>
        </fieldset>

        <fieldset>
          <legend>加精</legend>
          <label class="check"><input name="featuredEnabled" type="checkbox" /> 标记为精选</label>
          <label>结束时间<input name="featuredUntil" type="datetime-local" step="1" disabled /></label>
          <small>不填写结束时间即永久加精。</small>
        </fieldset>

        <footer>
          <button type="button" data-close="upload-dialog">取消</button>
          <button class="primary" type="submit">上传并保存</button>
        </footer>
      </form>
    </dialog>

    <dialog id="edit-dialog">
      <form class="editor" id="edit-form">
        <header>
          <h2>编辑截图</h2>
          <button class="close-button" type="button" data-close="edit-dialog" aria-label="关闭">×</button>
        </header>

        <input name="id" type="hidden" />
        <label>分类<select name="category" required></select></label>
        <label>截图时间<input name="time" type="datetime-local" step="1" required /></label>
        <label class="wide">标题<input name="title" maxlength="160" placeholder="可选" /></label>
        <label class="wide">照片评论<textarea name="comment" maxlength="2000" rows="4"></textarea></label>
        <label class="wide">标签<input name="tags" placeholder="多个标签用逗号分隔" /></label>

        <fieldset>
          <legend>置顶</legend>
          <label class="check"><input name="pinnedEnabled" type="checkbox" /> 启用置顶</label>
          <label>结束时间<input name="pinnedUntil" type="datetime-local" step="1" /></label>
          <small>不填写结束时间即永久置顶。</small>
        </fieldset>

        <fieldset>
          <legend>加精</legend>
          <label class="check"><input name="featuredEnabled" type="checkbox" /> 标记为精选</label>
          <label>结束时间<input name="featuredUntil" type="datetime-local" step="1" /></label>
          <small>不填写结束时间即永久加精。</small>
        </fieldset>

        <footer class="split-footer">
          <button class="danger" id="delete-button" type="button">删除图片</button>
          <span>
            <button type="button" data-close="edit-dialog">取消</button>
            <button class="primary" type="submit">保存修改</button>
          </span>
        </footer>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
